<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي - TechCare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="../common/storage.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f8fafc;
            direction: rtl;
            padding: 20px;
        }
        .header {
            background: #065f46;
            color: white;
            padding: 16px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .order-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .order-number {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }
        .status {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }
        .completed { background: #d1fae5; color: #065f46; }
        .pending { background: #fef3c7; color: #b45309; }
        .cancelled { background: #fee2e2; color: #991b1b; }
        .empty { text-align: center; color: #64748b; margin-top: 50px; }
        .back-btn {
            position: fixed; bottom: 20px; left: 20px; background: #10b981;
            color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer;
        }
        .btn-icon { background: none; border: none; font-size: 18px; cursor: pointer; padding: 6px; border-radius: 50%; color: #10b981; }
        .btn-icon:hover { background: #ecfdf5; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; border-radius: 32px; max-width: 500px; width: 90%; max-height: 80vh;
            overflow-y: auto; padding: 24px; position: relative;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; border-bottom: 1px solid #e2e8f0; padding-bottom: 12px;
        }
        .close-modal { background: none; border: none; font-size: 24px; cursor: pointer; color: #64748b; }
        .detail-item { margin-bottom: 16px; }
        .detail-label { font-weight: bold; color: #0f172a; display: block; margin-bottom: 4px; }
        .detail-value { color: #334155; background: #f8fafc; padding: 8px 12px; border-radius: 16px; }
        .images-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .images-preview img, .images-preview video { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; }
    </style>
</head>
<body>
<div class="header"><i class="fas fa-clipboard-list"></i> طلباتي</div>
<div id="ordersList"></div>
<button class="back-btn" id="backBtn">← العودة للرئيسية</button>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>تفاصيل الطلب</h3><button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button></div>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const currentUser = getCurrentUser();
    if (!currentUser || !currentUser.mobile) window.location.href = "login.html";

    document.getElementById('backBtn').onclick = () => {
        window.location.href = "technician-dashboard.html";
    };

    let orders = getServiceRequestsByCustomer(currentUser.mobile);
    const container = document.getElementById('ordersList');

    function renderOrders() {
        container.innerHTML = '';
        if (orders.length === 0) {
            container.innerHTML = '<div class="empty">📭 لا توجد طلبات سابقة</div>';
            return;
        }
        orders.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        orders.forEach((order, idx) => {
            const statusClass = order.status === 'مكتمل' ? 'completed' : (order.status === 'قيد الانتظار' ? 'pending' : 'cancelled');
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div>
                    <div><strong>${order.serviceType || order.category + ' - ' + order.type}</strong></div>
                    <div class="order-number">رقم الطلب: ${order.requestNumber}</div>
                    <div class="order-date">${new Date(order.createdAt).toLocaleDateString('ar-EG')}</div>
                </div>
                <div class="status ${statusClass}">${order.status}</div>
                <button class="btn-icon" data-idx="${idx}" title="تفاصيل"><i class="fas fa-info-circle"></i></button>
            `;
            container.appendChild(card);
        });
        document.querySelectorAll('.btn-icon').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = btn.getAttribute('data-idx');
                showOrderDetails(orders[idx]);
            });
        });
    }

    function showOrderDetails(order) {
        const modal = document.getElementById('detailsModal');
        const modalBody = document.getElementById('modalBody');
        let imagesHtml = '';
        if (order.files && order.files.length > 0) {
            imagesHtml = '<div class="images-preview">';
            order.files.forEach(file => {
                if (file.startsWith('data:image')) imagesHtml += `<img src="${file}" alt="صورة">`;
                else if (file.startsWith('data:video')) imagesHtml += `<video src="${file}" controls style="width:80px;height:80px;border-radius:12px;"></video>`;
            });
            imagesHtml += '</div>';
        } else imagesHtml = '<div class="detail-value">لا توجد صور أو فيديوهات مرفقة</div>';
        modalBody.innerHTML = `
            <div class="detail-item"><span class="detail-label">رقم الطلب:</span><div class="detail-value">${order.requestNumber}</div></div>
            <div class="detail-item"><span class="detail-label">نوع الخدمة:</span><div class="detail-value">${order.serviceType || order.category}</div></div>
            <div class="detail-item"><span class="detail-label">الجهاز / الموديل:</span><div class="detail-value">${order.deviceModel || order.type + ' - ' + order.model}</div></div>
            <div class="detail-item"><span class="detail-label">وصف المشكلة:</span><div class="detail-value">${order.description || 'لا يوجد وصف'}</div></div>
            <div class="detail-item"><span class="detail-label">تاريخ الطلب:</span><div class="detail-value">${new Date(order.createdAt).toLocaleString('ar-EG')}</div></div>
            <div class="detail-item"><span class="detail-label">حالة الطلب:</span><div class="detail-value">${order.status}</div></div>
            <div class="detail-item"><span class="detail-label">الصور والفيديوهات:</span>${imagesHtml}</div>
        `;
        modal.style.display = 'flex';
    }
    document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('detailsModal').style.display = 'none');
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('detailsModal')) document.getElementById('detailsModal').style.display = 'none'; });
    renderOrders();
</script>
</body>
</html>
