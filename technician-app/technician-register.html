<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تسجيل فني</title>
    <script src="../common/storage.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4fa;
            padding: 20px;
            direction: rtl;
        }
        .demo-toggle {
            background: #f1f5f9;
            padding: 8px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        /* ========== Stepper جديد يعمل بشكل صحيح ========== */
        .stepper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
        }
        .step-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e2e8f0;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            z-index: 2;
            transition: all 0.3s;
        }
        .step-circle.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.2);
        }
        .step-circle.done {
            background: #22c55e;
            color: white;
        }
        .step-label {
            margin-top: 8px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }
        .step-label.active {
            color: #3b82f6;
            font-weight: bold;
        }
        /* الخطوط بين الدوائر */
        .step-wrapper {
            position: relative;
        }
        .step-wrapper:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 20px;
            right: calc(50% + 20px);
            width: calc(100% - 40px);
            height: 3px;
            background: #e2e8f0;
            z-index: 1;
            transition: background 0.3s;
        }
        .step-wrapper.completed:not(:last-child)::after {
            background: #3b82f6;
        }
        /* باقي التنسيقات */
        .form-section { display: none; }
        .form-section.active-section { display: block; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #0f172a; }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            background: white;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .file-input {
            padding: 8px;
            border: 2px dashed #e2e8f0;
            background: #f8fafc;
        }
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 4px; display: none; }
        .conditional-group { display: none; }
        .row-2col { display: flex; gap: 15px; }
        .row-2col > div { flex: 1; }
        @media (max-width: 600px) { .row-2col { flex-direction: column; } }
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .btn-secondary:hover { background: #cbd5e1; }
        .toast {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            background: #22c55e; color: white; padding: 12px;
            border-radius: 60px; text-align: center; z-index: 1100; display: none;
        }
        .other-nationality { display: none; margin-top: 10px; }
    </style>
</head>

<!-- وضع تجريبي -->
<div class="demo-toggle">
    <input type="checkbox" id="demoModeCheckbox">
    <label for="demoModeCheckbox">🧪 وضع تجريبي (تجاوز الحقول الإجبارية)</label>
</div>

        </div>
        <div class="step-wrapper" data-step="2" id="stepWrapper2">

            <div class="step-label" id="step2Label">المؤهلات والخبرات</div>
        </div>
        <div class="step-wrapper" data-step="3" id="stepWrapper3">
            <div class="step-circle" id="step3Circle">3</div>
            <div class="step-label" id="step3Label">الحساب البنكي</div>
        </div>
    </div>

    <!-- Step 1 -->

        </div>

                <option value="jordan">🇯🇴 أردني</option>
                <option value="syria">🇸🇾 سوري</option>
                <option value="lebanon">🇱🇧 لبناني</option>
                <option value="palestine">🇵🇸 فلسطيني</option>
                <option value="iraq">🇮🇶 عراقي</option>
                <option value="kuwait">🇰🇼 كويتي</option>
                <option value="bahrain">🇧🇭 بحريني</option>
                <option value="qatar">🇶🇦 قطري</option>
                <option value="uae">🇦🇪 إماراتي</option>
                <option value="oman">🇴🇲 عماني</option>

                <option value="tunisia">🇹🇳 تونسي</option>
                <option value="libya">🇱🇾 ليبي</option>
                <option value="mauritania">🇲🇷 موريتاني</option>
                <option value="india">🇮🇳 هندي</option>
                <option value="pakistan">🇵🇰 باكستاني</option>
                <option value="bangladesh">🇧🇩 بنغلاديشي</option>
                <option value="srilanka">🇱🇰 سريلانكي</option>

                <option value="indonesia">🇮🇩 إندونيسي</option>

</div>

    // الوضع التجريبي
    let demoMode = false;
    const demoCheckbox = document.getElementById('demoModeCheckbox');
    function showToastMsg(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.backgroundColor = isError ? '#ef4444' : '#22c55e';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    if (demoCheckbox) {
        demoCheckbox.addEventListener('change', (e) => {
            demoMode = e.target.checked;
            showToastMsg(demoMode ? "✅ وضع تجريبي: يمكنك إكمال التسجيل دون تعبئة الحقول" : "الوضع العادي: جميع الحقول مطلوبة");
        });
    }

    // تحديث الـ Stepper
    function updateStepper() {
        for (let i = 1; i <= 3; i++) {
            const circle = document.getElementById(`step${i}Circle`);
            const wrapper = document.getElementById(`stepWrapper${i}`);
            if (i < currentStep) {
                circle.classList.add('done');
                circle.classList.remove('active');
                wrapper.classList.add('completed');
            } else if (i === currentStep) {
                circle.classList.add('active');
                circle.classList.remove('done');
                wrapper.classList.remove('completed');
            } else {
                circle.classList.remove('active', 'done');
                wrapper.classList.remove('completed');
            }
        }
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.innerHTML = (currentStep === 3) ? t('submit') : t('next');
        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) prevBtn.style.display = (currentStep === 1) ? 'none' : 'inline-block';
    }

    let currentStep = 1;
    function showStep(step) {
        document.querySelectorAll('.form-section').forEach(section => section.classList.remove('active-section'));
        document.getElementById(`step${step}`).classList.add('active-section');
        currentStep = step;
        updateStepper();
    }

    function toggleOtherNationality() {
        const nationalitySelect = document.getElementById('nationality');
        const otherDiv = document.getElementById('otherNationalityDiv');
        if (otherDiv) otherDiv.style.display = (nationalitySelect.value === 'other') ? 'block' : 'none';
    }
    function toggleConditionalFields() {
        const nationality = document.getElementById('nationality').value;
        const isFreelance = document.getElementById('isFreelance').value;
        const isSaudi = (nationality === 'saudi');
        const showCompany = (!isSaudi) || (isSaudi && isFreelance === 'no');
        const companyFields = document.getElementById('companyFields');
        if (companyFields) companyFields.style.display = showCompany ? 'block' : 'none';
        const freelanceDocGroup = document.getElementById('freelanceDocGroup');
        if (freelanceDocGroup) freelanceDocGroup.style.display = (isSaudi && isFreelance === 'yes') ? 'block' : 'none';
    }

    function showError(id, msg) { const el = document.getElementById(id); if(el) { el.innerText = msg; el.style.display = 'block'; } }
    function hideError(id) { const el = document.getElementById(id); if(el) el.style.display = 'none'; }

    function validateStep(step) {
        if (demoMode) return true;
        let valid = true;
        if (step === 1) {
            const freelance = document.getElementById('isFreelance').value;
            const nationality = document.getElementById('nationality').value;
            const otherNat = document.getElementById('otherNationality').value.trim();
            const idNumber = document.getElementById('idNumber').value.trim();
            const nationalAddressFile = document.getElementById('nationalAddress').files[0];
            const city = document.getElementById('city').value;
            const neighborhood = document.getElementById('neighborhood').value;
            const mobile = document.getElementById('mobile').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const isSaudi = (nationality === 'saudi');
            const showCompany = (!isSaudi) || (isSaudi && freelance === 'no');
            if (!freelance) { showError('errorFreelance', t('required')); valid = false; } else hideError('errorFreelance');
            if (!nationality) { showError('errorNationality', t('required')); valid = false; } else hideError('errorNationality');
            if (nationality === 'other' && !otherNat) { showError('errorOtherNationality', t('required')); valid = false; } else hideError('errorOtherNationality');
            if (showCompany) {
                const companyName = document.getElementById('companyName').value.trim();
                const crNumber = document.getElementById('crNumber').value.trim();
                const crFile = document.getElementById('crFile').files[0];
                if (!companyName) { showError('errorCompanyName', t('required')); valid = false; } else hideError('errorCompanyName');
                if (!crNumber) { showError('errorCRNumber', t('required')); valid = false; } else hideError('errorCRNumber');
                if (!crFile) { showError('errorCrFile', t('fileRequired')); valid = false; } else hideError('errorCrFile');
            }
            if (!idNumber) { showError('errorIdNumber', t('required')); valid = false; } else hideError('errorIdNumber');
            if (!nationalAddressFile) { showError('errorNationalAddress', t('fileRequired')); valid = false; } else hideError('errorNationalAddress');
            if (!city) { showError('errorCity', t('required')); valid = false; } else hideError('errorCity');
            if (!neighborhood) { showError('errorNeighborhood', t('required')); valid = false; } else hideError('errorNeighborhood');
            if (!mobile.match(/^05\d{8}$/)) { showError('errorMobile', t('invalidMobile')); valid = false; } else hideError('errorMobile');
            if (!email.match(/^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/)) { showError('errorEmail', t('invalidEmail')); valid = false; } else hideError('errorEmail');
            if (!password) { showError('errorPassword', t('required')); valid = false; } else if (password.length < 8) { showError('errorPassword', t('invalidPassword')); valid = false; } else hideError('errorPassword');
        } else if (step === 2) {
            const education = document.getElementById('education').value;
            const certificateFile = document.getElementById('certificate').files[0];
            if (!education) { showError('errorEducation', t('required')); valid = false; } else hideError('errorEducation');
            if (!certificateFile) { showError('errorCertificate', t('fileRequired')); valid = false; } else hideError('errorCertificate');
        } else if (step === 3) {
            const bankName = document.getElementById('bankName').value.trim();
            const iban = document.getElementById('iban').value.trim();
            const accountHolder = document.getElementById('accountHolderName').value.trim();
            if (!bankName.match(/^[A-Za-z\s]+$/)) { showError('errorBankName', t('invalidBankName')); valid = false; } else hideError('errorBankName');
            if (!iban || iban.length < 15) { showError('errorIban', t('invalidIban')); valid = false; } else hideError('errorIban');
            if (!accountHolder) { showError('errorAccountHolder', t('required')); valid = false; } else hideError('errorAccountHolder');
        }
        return valid;
    }

    async function collectFileAsBase64(file) {
        return new Promise((resolve) => {
            if (!file) { resolve(null); return; }
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }

    window.addEventListener('load', () => {
