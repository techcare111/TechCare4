<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء كلمة المرور</title>
    <script src="storage.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; border-radius: 32px; padding: 32px; max-width: 450px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1e3a8a; margin-bottom: 8px; }
        .sub { text-align: center; color: #475569; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #0f172a; }
        input { width: 100%; padding: 12px 14px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 16px; }
        input:focus { border-color: #3b82f6; outline: none; }
        .btn { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 40px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 4px; display: none; }
        .toast { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #22c55e; color: white; padding: 12px; border-radius: 60px; text-align: center; z-index: 1100; display: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 إنشاء كلمة المرور</h1>
    <div class="sub">كلمة المرور لا تقل عن 8 أحرف أو أرقام أو رموز</div>
    <div class="form-group"><label>كلمة المرور</label><input type="password" id="password" placeholder="********"><div class="error-msg" id="errorPassword"></div></div>
    <div class="form-group"><label>تأكيد كلمة المرور</label><input type="password" id="confirmPassword" placeholder="********"><div class="error-msg" id="errorConfirm"></div></div>
    <button class="btn" id="submitBtn">متابعة</button>
</div>
<div id="toast" class="toast"></div>

<script>
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.backgroundColor = isError ? '#ef4444' : '#22c55e';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    document.getElementById('submitBtn').addEventListener('click', () => {
        const pwd = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        let valid = true;
        if (pwd.length < 8) {
            document.getElementById('errorPassword').innerText = "كلمة المرور يجب أن تكون 8 أحرف على الأقل";
            document.getElementById('errorPassword').style.display = 'block';
            valid = false;
        } else document.getElementById('errorPassword').style.display = 'none';
        if (pwd !== confirm) {
            document.getElementById('errorConfirm').innerText = "كلمتا المرور غير متطابقتين";
            document.getElementById('errorConfirm').style.display = 'block';
            valid = false;
        } else document.getElementById('errorConfirm').style.display = 'none';
        if (valid) {
            let current = getCurrentUser();
            if (!current || !current.mobile) { showToast("خطأ: لا يوجد مستخدم مؤقت", true); return; }
            const mobile = current.mobile;
            const role = current.role || localStorage.getItem('selectedRole');
            let updated = false;
            if (role === 'customer') {
                let customers = getCustomers();
                const idx = customers.findIndex(c => c.mobile === mobile);
                if (idx !== -1) { customers[idx].password = pwd; localStorage.setItem('customers', JSON.stringify(customers)); updated = true; }
            } else if (role === 'technician') {
                let technicians = getTechnicians();
                const idx = technicians.findIndex(t => t.mobile === mobile);
                if (idx !== -1) { technicians[idx].password = pwd; localStorage.setItem('technicians', JSON.stringify(technicians)); updated = true; }
                else { technicians.push({ ...current, password: pwd }); localStorage.setItem('technicians', JSON.stringify(technicians)); updated = true; }
            } else if (role === 'merchant') {
                let merchants = getMerchants();
                const idx = merchants.findIndex(m => m.mobile === mobile);
                if (idx !== -1) { merchants[idx].password = pwd; localStorage.setItem('merchants', JSON.stringify(merchants)); updated = true; }
            }
            if (updated) {
                current.password = pwd;
                saveCurrentUser(current);
                showToast("تم إنشاء كلمة المرور بنجاح ✅");
                // التوجيه إلى صفحة login مع الاحتفاظ بالدور لتحديد التطبيق المناسب
                setTimeout(() => {
                    if (role === 'customer') window.location.href = "../Customer-App/login.html";
                    else if (role === 'technician') window.location.href = "../Technician-App/login.html";
                    else if (role === 'merchant') window.location.href = "../Merchant-App/login.html";
                    else window.location.href = "../login.html";
                }, 1500);
            } else showToast("خطأ: لم يتم العثور على المستخدم", true);
        }
    });
</script>
</body>
</html>
