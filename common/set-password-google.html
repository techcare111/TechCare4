<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة كلمة مرور - TechCare</title>
    <script src="../common/storage.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
        }
        .card {
            background: white;
            border-radius: 40px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h2 { color: #1e40af; margin-bottom: 10px; }
        .sub { color: #475569; margin-bottom: 25px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #0f172a; }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 16px;
            font-family: inherit;
        }
        input:focus { border-color: #3b82f6; outline: none; }
        .btn {
            width: 100%;
            padding: 14px;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover { background: #3b82f6; }
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 5px; display: none; text-align: right; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 إضافة كلمة مرور</h2>
        <div class="sub">لحماية حسابك، يرجى إضافة كلمة مرور</div>
        <div class="form-group">
            <label>كلمة المرور الجديدة</label>
            <input type="password" id="password" placeholder="********">
            <div class="error-msg" id="errorPassword"></div>
        </div>
        <div class="form-group">
            <label>تأكيد كلمة المرور</label>
            <input type="password" id="confirmPassword" placeholder="********">
            <div class="error-msg" id="errorConfirm"></div>
        </div>
        <button class="btn" id="saveBtn">حفظ كلمة المرور</button>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        // الحصول على uid من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        const email = urlParams.get('email');
        const role = urlParams.get('role') || 'customer';

        if (!uid || !email) {
            showToast("بيانات غير مكتملة، الرجاء تسجيل الدخول مرة أخرى", true);
            setTimeout(() => window.location.href = "login.html", 2000);
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.backgroundColor = isError ? '#ef4444' : '#22c55e';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            if (el) {
                el.innerText = msg;
                el.style.display = 'block';
            }
        }

        function hideError(id) {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            hideError('errorPassword');
            hideError('errorConfirm');

            if (!password) {
                showError('errorPassword', 'يرجى إدخال كلمة المرور');
                return;
            }
            if (password.length < 8) {
                showError('errorPassword', 'كلمة المرور يجب أن تكون 8 أحرف على الأقل');
                return;
            }
            if (password !== confirm) {
                showError('errorConfirm', 'كلمتا المرور غير متطابقتين');
                return;
            }

            try {
                const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
                const { getAuth, updatePassword } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
                
                const firebaseConfig = {
                    apiKey: "AIzaSyBrTaYLYWW9H31_O6fWL_36BKB4Oim0ksM",
                    authDomain: "techcare-80c7b.firebaseapp.com",
                    projectId: "techcare-80c7b",
                    storageBucket: "techcare-80c7b.firebasestorage.app",
                    messagingSenderId: "94772613240",
                    appId: "1:94772613240:web:3d0ae9c03561e7c6bb1d8d",
                    measurementId: "G-59VFXVH57V"
                };
                
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                
                // المستخدم الحالي هو الذي سجل دخوله بـ Google
                const user = auth.currentUser;
                if (!user || user.uid !== uid) {
                    showToast("خطأ في التحقق من المستخدم", true);
                    return;
                }
                
                await updatePassword(user, password);
                
                // حفظ كلمة المرور في localStorage
                let userData = JSON.parse(localStorage.getItem('currentUser')) || {};
                userData.password = password;
                localStorage.setItem('currentUser', JSON.stringify(userData));
                
                showToast("✅ تم إضافة كلمة المرور بنجاح");
                setTimeout(() => {
                    if (role === 'customer') window.location.href = "../Customer-App/customer-dashboard.html";
                    else if (role === 'technician') window.location.href = "../Technician-App/technician-dashboard.html";
                    else if (role === 'merchant') window.location.href = "../Merchant-App/merchant-dashboard.html";
                    else window.location.href = "login.html";
                }, 1500);
            } catch (error) {
                console.error(error);
                showToast("حدث خطأ: " + error.message, true);
            }
        });
    </script>
</body>
</html>
