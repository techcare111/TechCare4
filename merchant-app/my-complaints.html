<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكواي - TechCare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="../common/storage.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f8fafc;
            direction: rtl;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .header {
            background: #b45309; color: white; padding: 16px; border-radius: 20px;
            text-align: center; margin-bottom: 20px;
        }
        .complaint-card {
            background: white; border-radius: 24px; padding: 16px; margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer;
        }
        .complaint-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
        }
        .status {
            padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: bold;
        }
        .pending { background: #e2e8f0; color: #1e293b; }
        .resolved { background: #d1fae5; color: #065f46; }
        .empty { text-align: center; color: #64748b; margin-top: 50px; }
        .back-btn {
            position: fixed; bottom: 20px; left: 20px; background: #64748b;
            color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; border-radius: 32px; max-width: 500px; width: 90%;
            max-height: 80vh; overflow-y: auto; padding: 24px;
        }
        .images-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .images-preview img, .images-preview video { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .btn-secondary {
            background: #64748b; color: white; border: none; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><i class="fas fa-list"></i> شكواي السابقة</div>
    <div id="complaintsList"></div>
</div>
<button class="back-btn" id="backBtn">← رجوع</button>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:16px;">تفاصيل الشكوى</h3>
        <div id="modalBody"></div>
        <button class="btn-secondary" style="margin-top:20px; width:100%;" onclick="document.getElementById('detailsModal').style.display='none'">إغلاق</button>
    </div>
</div>

<script>
    const currentUser = getCurrentUser();
    if (!currentUser) window.location.href = "login.html";

    document.getElementById('backBtn').onclick = () => {
        window.location.href = "complaints.html";
    };

    const complaints = getComplaintsByCustomer(currentUser.mobile);
    const container = document.getElementById('complaintsList');
    if (complaints.length === 0) {
        container.innerHTML = '<div class="empty">📭 لا توجد شكاوى سابقة</div>';
    } else {
        complaints.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        complaints.forEach(comp => {
            const card = document.createElement('div');
            card.className = 'complaint-card';
            card.setAttribute('data-complaint', JSON.stringify(comp));
            card.innerHTML = `
                <div class="complaint-header">
                    <div><strong>${comp.type}</strong><br><span style="font-size:12px;">طلب رقم ${comp.requestNumber}</span></div>
                    <div class="status ${comp.status === 'pending' ? 'pending' : 'resolved'}">${comp.status === 'pending' ? 'قيد المراجعة' : 'تمت المراجعة'}</div>
                </div>
                <div style="font-size:12px; color:#64748b;">${new Date(comp.createdAt).toLocaleDateString('ar-EG')}</div>
            `;
            card.addEventListener('click', () => showDetails(comp));
            container.appendChild(card);
        });
    }

    function showDetails(comp) {
        const modalBody = document.getElementById('modalBody');
        let attachmentsHtml = '';
        if (comp.attachments && comp.attachments.length > 0) {
            attachmentsHtml = '<div class="images-preview">';
            comp.attachments.forEach(file => {
                if (file.startsWith('data:image')) attachmentsHtml += `<img src="${file}">`;
                else if (file.startsWith('data:video')) attachmentsHtml += `<video src="${file}" controls style="width:80px;height:80px;border-radius:12px;"></video>`;
            });
            attachmentsHtml += '</div>';
        } else attachmentsHtml = '<div>لا توجد مرفقات</div>';
        modalBody.innerHTML = `
            <div><strong>نوع الشكوى:</strong> ${comp.type}</div>
            <div><strong>رقم الطلب:</strong> ${comp.requestNumber}</div>
            <div><strong>تاريخ الشكوى:</strong> ${new Date(comp.createdAt).toLocaleString('ar-EG')}</div>
            <div><strong>الوصف:</strong><br>${comp.description}</div>
            <div><strong>المرفقات:</strong>${attachmentsHtml}</div>
            <div><strong>الحالة:</strong> <span class="status ${comp.status === 'pending' ? 'pending' : 'resolved'}">${comp.status === 'pending' ? 'قيد المراجعة' : 'تمت المراجعة'}</span></div>
        `;
        document.getElementById('detailsModal').style.display = 'flex';
    }
</script>
</body>
</html>
