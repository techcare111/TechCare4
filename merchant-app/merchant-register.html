<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تسجيل التاجر</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../common/storage.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4fa;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 { text-align: center; color: #b45309; margin-bottom: 8px; }
        .sub { text-align: center; color: #475569; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #0f172a; }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            background: white;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #f59e0b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
        }
        .file-input {
            padding: 8px;
            border: 2px dashed #e2e8f0;
            background: #f8fafc;
        }
        .map-container { border-radius: 20px; overflow: hidden; border: 2px solid #e2e8f0; margin-bottom: 10px; }
        #map { height: 220px; width: 100%; }
        .current-loc-btn {
            background: #fef3c7; border: none; padding: 10px 16px; border-radius: 40px;
            font-size: 14px; font-weight: 500; color: #b45309; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px; margin-top: 6px;
        }
        .button-group { display: flex; gap: 16px; margin-top: 28px; }
        .btn {
            flex: 1; padding: 14px; border-radius: 40px; font-weight: bold; font-size: 16px;
            cursor: pointer; border: none; text-align: center;
        }
        .btn-primary { background: #f59e0b; color: white; }
        .btn-primary:hover { background: #d97706; }
        .btn-outline { background: white; border: 2px solid #f59e0b; color: #f59e0b; }
        .btn-demo {
            background: #f59e0b; color: white; border: none; padding: 14px; border-radius: 40px;
            font-weight: bold; font-size: 16px; cursor: pointer; text-align: center; margin-top: 10px;
        }
        .btn-demo:hover { background: #d97706; }
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 4px; display: none; }
        .toast {
            position: fixed; bottom: 30px; left: 20px; right: 20px; background: #22c55e;
            color: white; padding: 12px; border-radius: 60px; text-align: center;
            z-index: 1100; display: none;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .checkbox-group input {
            width: auto;
            transform: scale(1.2);
            margin-left: 5px;
        }
        .download-link {
            color: #f59e0b;
            cursor: pointer;
            text-decoration: underline;
            margin-right: 15px;
        }
        .row-2col {
            display: flex;
            gap: 15px;
        }
        .row-2col > div {
            flex: 1;
        }
        @media (max-width: 600px) {
            .row-2col { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="pageTitle">📝 تسجيل تاجر</h1>
    <div class="sub" id="pageSub">يرجى إكمال بيانات المؤسسة بدقة</div>

    <div class="row-2col">
        <div class="form-group">
            <label id="labelCompanyName">اسم المؤسسة <span style="color:red;">*</span></label>
            <input type="text" id="companyName" placeholder="مثال: مؤسسة التقنية الحديثة">
            <div class="error-msg" id="errorCompanyName"></div>
        </div>
        <div class="form-group">
            <label id="labelCRNumber">رقم السجل التجاري <span style="color:red;">*</span></label>
            <input type="text" id="crNumber" placeholder="رقم السجل">
            <div class="error-msg" id="errorCRNumber"></div>
        </div>
    </div>

    <div class="form-group">
        <label id="labelCommercialRecord">إرفاق السجل التجاري <span style="color:red;">*</span></label>
        <input type="file" id="crFile" accept=".pdf,.jpg,.jpeg,.png" class="file-input">
        <div class="error-msg" id="errorCrFile"></div>
        <div style="font-size:12px; color:#475569; margin-top:4px;">الصيغ المسموحة: PDF, JPG, JPEG, PNG</div>
    </div>

    <div class="row-2col">
        <div class="form-group">
            <label id="labelCity">المدينة <span style="color:red;">*</span></label>
            <select id="city">
                <option value="">-- اختر المدينة --</option>
                <option value="الرياض">الرياض</option>
                <option value="جدة">جدة</option>
                <option value="مكة">مكة</option>
                <option value="الدمام">الدمام</option>
            </select>
            <div class="error-msg" id="errorCity"></div>
        </div>
        <div class="form-group">
            <label id="labelNeighborhood">الحي <span style="color:red;">*</span></label>
            <select id="neighborhood">
                <option value="">-- اختر الحي --</option>
            </select>
            <div class="error-msg" id="errorNeighborhood"></div>
        </div>
    </div>

    <div class="form-group">
        <label id="labelActivityType">نوع النشاط <span style="color:red;">*</span></label>
        <select id="activityType">
            <option value="">-- اختر النشاط --</option>
            <option value="اجهزة كمبيوتر">اجهزة كمبيوتر</option>
            <option value="اجهزة جوالات">اجهزة جوالات</option>
            <option value="اجهزة منزلية">اجهزة منزلية</option>
            <option value="كاميرات مراقبة وسيرفرات">كاميرات مراقبة وسيرفرات</option>
        </select>
        <div class="error-msg" id="errorActivityType"></div>
    </div>

    <div class="row-2col">
        <div class="form-group">
            <label id="labelEmail">البريد الإلكتروني <span style="color:red;">*</span></label>
            <input type="email" id="email" placeholder="example@domain.com">
            <div class="error-msg" id="errorEmail"></div>
        </div>
        <div class="form-group">
            <label id="labelMobile">رقم الجوال <span style="color:red;">*</span></label>
            <input type="tel" id="mobile" placeholder="05xxxxxxxx" maxlength="10" inputmode="numeric">
            <div class="error-msg" id="errorMobile"></div>
        </div>
    </div>

    <div class="form-group">
        <label id="labelPassword">كلمة المرور <span style="color:red;">*</span></label>
        <input type="password" id="password" placeholder="********">
        <div class="error-msg" id="errorPassword"></div>
    </div>

    <div class="form-group">
        <label id="labelMap">الموقع على الخريطة <span style="color:red;">*</span></label>
        <div class="map-container">
            <div id="map"></div>
        </div>
        <button type="button" class="current-loc-btn" id="getLocationBtn">
            📍 <span id="btnLocText">تحديد موقعي الحالي</span>
        </button>
        <div class="error-msg" id="errorMap"></div>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="agreeContract">
        <label id="agreeLabel" for="agreeContract">أوافق على العقد والشروط</label>
        <span id="downloadContract" class="download-link">📄 تحميل العقد</span>
    </div>
    <div class="error-msg" id="errorAgree"></div>

    <div class="button-group">
        <button class="btn btn-outline" id="saveBtn">💾 <span id="btnSaveText">حفظ</span></button>
        <button class="btn btn-primary" id="continueBtn">🚀 <span id="btnContinueText">متابعة</span></button>
    </div>

    <!-- زر الوضع التجريبي -->
    <button class="btn-demo" id="demoModeBtn"><i class="fas fa-flask"></i> تجربة المنصة (وضع تجريبي)</button>
</div>

<div id="toast" class="toast"></div>

    // ===================== الخريطة =====================
    let map, marker, currentLatLng = null;
    function initMap() {
        const defaultLoc = [24.7136, 46.6753];
        map = L.map('map').setView(defaultLoc, 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);
        marker = L.marker(defaultLoc, { draggable: true }).addTo(map);
        currentLatLng = { lat: defaultLoc[0], lng: defaultLoc[1] };
        marker.on('dragend', function(e) {
            const pos = marker.getLatLng();
            currentLatLng = { lat: pos.lat, lng: pos.lng };
            document.getElementById('errorMap').style.display = 'none';
        });
    }
    function getCurrentLocation() {
        if (!navigator.geolocation) { showToastMsg(tPage('errorMap'), true); return; }
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                map.setView([lat, lng], 14);
                marker.setLatLng([lat, lng]);
                currentLatLng = { lat, lng };
                document.getElementById('errorMap').style.display = 'none';
                showToastMsg("تم تحديد الموقع");
            },
            () => showToastMsg("فشل تحديد الموقع", true)
        );
    }

    // ===================== تحديث الأحياء =====================
    function updateNeighborhoods() {
        const citySelect = document.getElementById('city');
        const neighborhoodSelect = document.getElementById('neighborhood');
        const selectedCity = citySelect.value;
        neighborhoodSelect.innerHTML = '<option value="">-- اختر الحي --</option>';
        if (selectedCity && citiesData[selectedCity]) {
            citiesData[selectedCity].forEach(hood => {
                const option = document.createElement('option');
                option.value = hood;
                option.textContent = hood;
                neighborhoodSelect.appendChild(option);
            });
        }
    }
    document.getElementById('city').addEventListener('change', updateNeighborhoods);

    // ===================== عرض رسائل =====================
    function showError(id, msg) {
        const el = document.getElementById(id);
        if (el) { el.innerText = msg; el.style.display = 'block'; }
    }
    function hideError(id) {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
    }
    function showToastMsg(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.backgroundColor = isError ? '#ef4444' : '#22c55e';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // ===================== التحقق من صحة النموذج =====================
    function validateForm() {
        let isValid = true;
        const companyName = document.getElementById('companyName').value.trim();
        const crNumber = document.getElementById('crNumber').value.trim();
        const crFile = document.getElementById('crFile').files[0];
        const city = document.getElementById('city').value;
        const neighborhood = document.getElementById('neighborhood').value;
        const activityType = document.getElementById('activityType').value;
        const email = document.getElementById('email').value.trim();
        const mobile = document.getElementById('mobile').value.trim();
        const password = document.getElementById('password').value;
        const agree = document.getElementById('agreeContract').checked;
        const emailRegex = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;

        if (!companyName) { showError('errorCompanyName', tPage('errorCompanyName')); isValid = false; }
        else { hideError('errorCompanyName'); }

        if (!crNumber) { showError('errorCRNumber', tPage('errorCRNumber')); isValid = false; }
        else { hideError('errorCRNumber'); }

        if (!crFile) { showError('errorCrFile', tPage('errorCrFile')); isValid = false; }
        else { hideError('errorCrFile'); }

        if (!city) { showError('errorCity', tPage('errorCity')); isValid = false; }
        else { hideError('errorCity'); }

        if (!neighborhood) { showError('errorNeighborhood', tPage('errorNeighborhood')); isValid = false; }
        else { hideError('errorNeighborhood'); }

        if (!activityType) { showError('errorActivityType', tPage('errorActivityType')); isValid = false; }
        else { hideError('errorActivityType'); }

        if (!email || !emailRegex.test(email)) { showError('errorEmail', tPage('errorEmail')); isValid = false; }
        else { hideError('errorEmail'); }

        if (!mobile.match(/^05\d{8}$/)) { showError('errorMobile', tPage('errorMobile')); isValid = false; }
        else { hideError('errorMobile'); }

        if (!password) { showError('errorPassword', tPage('errorPassword')); isValid = false; }
        else if (password.length < 8) { showError('errorPassword', 'كلمة المرور يجب أن تكون 8 أحرف على الأقل'); isValid = false; }
        else { hideError('errorPassword'); }

        if (!currentLatLng) { showError('errorMap', tPage('errorMap')); isValid = false; }
        else { hideError('errorMap'); }

        if (!agree) { showError('errorAgree', tPage('errorAgree')); isValid = false; }
        else { hideError('errorAgree'); }

        return isValid;
    }

    // ===================== جمع البيانات =====================
    function collectFormData() {
        return {
            companyName: document.getElementById('companyName').value.trim(),
            crNumber: document.getElementById('crNumber').value.trim(),
            city: document.getElementById('city').value,
            neighborhood: document.getElementById('neighborhood').value,
            activityType: document.getElementById('activityType').value,
            email: document.getElementById('email').value.trim(),
            mobile: document.getElementById('mobile').value.trim(),
            password: document.getElementById('password').value,
            latitude: currentLatLng.lat,
            longitude: currentLatLng.lng,
            role: 'merchant'
        };
    }

    async function saveToFirebase(formData, fileBase64) {
        try {
            const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
            const { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
            const { getFirestore, doc, setDoc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
            
            const firebaseConfig = {
                apiKey: "AIzaSyBrTaYLYWW9H31_O6fWL_36BKB4Oim0ksM",
                authDomain: "techcare-80c7b.firebaseapp.com",
                projectId: "techcare-80c7b",
                storageBucket: "techcare-80c7b.firebasestorage.app",
                messagingSenderId: "94772613240",
                appId: "1:94772613240:web:3d0ae9c03561e7c6bb1d8d",
                measurementId: "G-59VFXVH57V"
            };
            
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            
            let uid;
            let isNewUser = false;
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, formData.email, formData.password);
                uid = userCredential.user.uid;
                isNewUser = false;
            } catch (signInError) {
                if (signInError.code === 'auth/user-not-found') {
                    const newUser = await createUserWithEmailAndPassword(auth, formData.email, formData.password);
                    uid = newUser.user.uid;
                    isNewUser = true;
                } else {
                    throw signInError;
                }
            }
            
            const merchantDoc = await getDoc(doc(db, 'merchants', uid));
            
            if (merchantDoc.exists()) {
                showToastMsg('هذا المستخدم مسجل بالفعل كتاجر', true);
                return false;
            }
            
            const merchantData = {
                companyName: formData.companyName,
                crNumber: formData.crNumber,
                crFileBase64: fileBase64,
                mobile: formData.mobile,
                email: formData.email,
                city: formData.city,
                neighborhood: formData.neighborhood,
                activityType: formData.activityType,
                latitude: formData.latitude,
                longitude: formData.longitude,
                role: 'merchant',
                createdAt: new Date().toISOString()
            };
            
            await setDoc(doc(db, 'merchants', uid), merchantData);
            saveCurrentUser({ ...merchantData, uid, role: 'merchant' });
            
            if (isNewUser) {
                showToastMsg('تم إنشاء حساب تاجر جديد بنجاح ✅');
            } else {
                showToastMsg('تم إضافة دور تاجر لحسابك الحالي بنجاح ✅');
            }
            
            return true;
        } catch (error) {
            console.error(error);
            showToastMsg('خطأ في التسجيل: ' + error.message, true);
            return false;
        }
    }

    async function processSaveAndContinue(redirect = true) {
        if (!validateForm()) return;
        
        const formData = collectFormData();
        const file = document.getElementById('crFile').files[0];
        
        let fileBase64 = null;
        if (file) {
            fileBase64 = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }
        
        const success = await saveToFirebase(formData, fileBase64);
        
        if (success && redirect) {
            setTimeout(() => {
                window.location.href = "merchant-dashboard.html";
            }, 1500);
        }
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
        processSaveAndContinue(false);
    });
    document.getElementById('continueBtn').addEventListener('click', () => {
        processSaveAndContinue(true);
    });
    document.getElementById('downloadContract').addEventListener('click', () => {
        const link = document.createElement('a');
        link.href = "sample-contract.pdf";
        link.download = "contract.pdf";
        link.click();
        showToastMsg("تم تحميل العقد (نموذج)");
    });

        localStorage.setItem('currentUser', JSON.stringify(demoMerchant));

        window.location.href = "merchant-dashboard.html?demo=true";
    });

    window.addEventListener('load', () => {
        initMap();
        document.getElementById('getLocationBtn').addEventListener('click', getCurrentLocation);
        updateNeighborhoods();
    });
</script>
