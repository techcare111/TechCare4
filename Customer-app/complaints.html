<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>حل المشكلات والنزاعات - TechCare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="../common/storage.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f8fafc;
            direction: rtl;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 { font-size: 26px; color: #1e40af; margin-bottom: 8px; text-align: center; }
        .sub { text-align: center; color: #475569; margin-bottom: 24px; }
        .card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        .card:hover {
            background: #eef2ff;
            transform: translateY(-2px);
            border-color: #3b82f6;
        }
        .card i {
            font-size: 40px;
            color: #1e40af;
            margin-bottom: 12px;
        }
        .card h3 {
            margin-bottom: 8px;
            color: #0f172a;
        }
        .card p {
            color: #475569;
            font-size: 14px;
        }
        .back-btn {
            position: fixed; bottom: 20px; left: 20px; background: #64748b;
            color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-handshake"></i> حل المشكلات والنزاعات</h1>
    <div class="sub">اختر الخدمة المناسبة</div>

    <div class="card" id="newComplaintCard">
        <i class="fas fa-file-alt"></i>
        <h3>شكوى جديدة</h3>
        <p>تقديم شكوى بخصوص طلب صيانة</p>
    </div>

    <div class="card" id="myComplaintsCard">
        <i class="fas fa-history"></i>
        <h3>متابعة شكوى سابقة</h3>
        <p>عرض حالة الشكاوى السابقة</p>
    </div>

    <div class="card" id="directSupportBtn">
        <i class="fas fa-comments"></i>
        <h3>تواصل مباشر مع الدعم</h3>
        <p>محادثة فورية مع فريق الدعم</p>
    </div>
</div>
<button class="back-btn" id="backBtn">← العودة</button>

<script>
    const currentUser = getCurrentUser();
    if (!currentUser) window.location.href = "login.html";

    document.getElementById('backBtn').onclick = () => {
        window.location.href = "customer-dashboard.html";
    };

    document.getElementById('newComplaintCard').onclick = () => {
        window.location.href = "new-complaint.html";
    };
    document.getElementById('myComplaintsCard').onclick = () => {
        window.location.href = "my-complaints.html";
    };
    document.getElementById('directSupportBtn').onclick = () => {
        window.location.href = "support-chat.html";
    };
</script>
</body>
</html>
