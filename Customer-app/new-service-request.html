<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>طلب خدمة جديدة - TechCare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../common/storage.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f8fafc;
            direction: rtl;
            padding: 20px;
        }
        .demo-toggle {
            background: #f1f5f9;
            padding: 8px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 { font-size: 26px; color: #1e40af; margin-bottom: 8px; }
        .sub { color: #475569; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 6px; color: #0f172a; }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            background: white;
        }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; outline: none; }
        .map-container { border-radius: 20px; overflow: hidden; border: 2px solid #e2e8f0; margin-bottom: 10px; }
        #map { height: 220px; width: 100%; }
        .current-loc-btn {
            background: #eef2ff; border: none; padding: 8px 16px; border-radius: 40px; font-size: 14px; cursor: pointer; margin-top: 6px; display: inline-flex; align-items: center; gap: 8px;
        }
        .image-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .image-preview img, .image-preview video { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid #ddd; }
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 4px; display: none; }
        .button-group { display: flex; gap: 16px; margin-top: 28px; }
        .btn {
            flex: 1; padding: 14px; border-radius: 40px; font-weight: bold; border: none; cursor: pointer; font-size: 16px;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .toast {
            position: fixed; bottom: 30px; left: 20px; right: 20px; background: #22c55e; color: white; padding: 12px;
            border-radius: 60px; text-align: center; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div style="max-width: 700px; margin: 0 auto;">
    <div class="demo-toggle">
        <input type="checkbox" id="demoModeCheckbox"> <label for="demoModeCheckbox">🧪 وضع تجريبي (تجاوز الحقول)</label>
    </div>
    <div class="container">
        <h1><i class="fas fa-tools"></i> طلب خدمة جديدة</h1>
        <div class="sub">اختر نوع الجهاز، ثم البراند، ثم الموديل</div>

        <div class="form-group">
            <label>اختر الفئة <span style="color:red;">*</span></label>
            <select id="categorySelect">
                <option value="">-- اختر الفئة --</option>
                <option value="phones">📱 هواتف</option>
                <option value="tablets">📟 أجهزة لوحية</option>
                <option value="laptops">💻 لابتوبات</option>
                <option value="smartwatches">⌚ ساعات ذكية</option>
                <option value="office">🖥️ أجهزة مكتبية</option>
                <option value="home">🏠 أجهزة منزلية</option>
            </select>
            <div class="error-msg" id="errorCategory"></div>
        </div>

        <div class="form-group">
            <label>اختر النوع / البراند <span style="color:red;">*</span></label>
            <select id="typeSelect" disabled>
                <option value="">-- اختر الفئة أولاً --</option>
            </select>
            <div class="error-msg" id="errorType"></div>
        </div>

        <div class="form-group" id="modelGroup">
            <label>اختر الموديل / الفئة <span style="color:red;">*</span></label>
            <select id="modelSelect" disabled>
                <option value="">-- اختر النوع أولاً --</option>
            </select>
            <div class="error-msg" id="errorModel"></div>
        </div>

        <div class="form-group">
            <label>وصف المشكلة <span style="color:red;">*</span></label>
            <textarea id="description" rows="3" placeholder="مثال: الشاشة لا تعمل، البطارية تنفذ بسرعة، لا يبرد..."></textarea>
            <div class="error-msg" id="errorDesc"></div>
        </div>

        <div class="form-group">
            <label>رفع صور أو فيديو (حتى 6 ملفات) <span style="color:red;">*</span></label>
            <input type="file" id="filesInput" accept="image/*,video/*" multiple>
            <div class="image-preview" id="imagePreview"></div>
            <div class="error-msg" id="errorFiles"></div>
        </div>

        <div class="form-group">
            <label>الموقع على الخريطة <span style="color:red;">*</span></label>
            <div class="map-container">
                <div id="map"></div>
            </div>
            <button type="button" class="current-loc-btn" id="currentLocationBtn">
                📍 تحديد موقعي الحالي
            </button>
            <div class="error-msg" id="errorLocation"></div>
        </div>

        <div class="button-group">
            <button class="btn btn-secondary" id="cancelBtn">إلغاء</button>
            <button class="btn btn-primary" id="submitBtn">إرسال الطلب</button>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
    const currentUser = getCurrentUser();
    if (!currentUser || !currentUser.mobile) {
        alert("الرجاء تسجيل الدخول أولاً");
        window.location.href = "login.html";
    }

    // بيانات الأنواع والموديلات
    const typesByCategory = {
        phones: {
            "iPhone": ["iPhone 7", "iPhone 8", "iPhone X", "iPhone XR", "iPhone XS", "iPhone 11", "iPhone 12", "iPhone 13", "iPhone 14", "iPhone 15", "iPhone SE"],
            "Samsung": ["Galaxy S8", "Galaxy S9", "Galaxy S10", "Galaxy S20", "Galaxy S21", "Galaxy S22", "Galaxy S23", "Galaxy Note 8", "Galaxy Note 9", "Galaxy Note 10", "Galaxy Note 20", "Galaxy A series", "Galaxy Z Fold", "Galaxy Z Flip"],
            "Huawei": ["P20", "P30", "P40", "P50", "Mate 10", "Mate 20", "Mate 30", "Mate 40", "Nova series"],
            "Xiaomi": ["Mi 9", "Mi 10", "Mi 11", "Mi 12", "Redmi Note series", "Poco series"],
            "Oppo": ["Find X series", "Reno series", "A series"],
            "Vivo": ["X series", "V series", "Y series"],
            "Honor": ["Honor 8", "Honor 9", "Honor 10", "Honor 20", "Honor 50", "Magic series"],
            "Google Pixel": ["Pixel 3", "Pixel 4", "Pixel 5", "Pixel 6", "Pixel 7", "Pixel 8"],
            "Nokia": ["Nokia 6", "Nokia 7", "Nokia 8", "Nokia 9"],
            "OnePlus": ["OnePlus 6", "OnePlus 7", "OnePlus 8", "OnePlus 9", "OnePlus 10", "OnePlus 11"],
            "Realme": ["Realme 5", "Realme 6", "Realme 7", "Realme 8", "Realme 9", "Realme 10", "Realme GT"],
            "Tecno": ["Camon series", "Spark series", "Pova series"],
            "Infinix": ["Note series", "Hot series", "Zero series"]
        },
        tablets: {
            "iPad": ["iPad 7th Gen", "iPad 8th Gen", "iPad 9th Gen", "iPad Air 3", "iPad Air 4", "iPad Air 5", "iPad Pro 11", "iPad Pro 12.9", "iPad Mini 5", "iPad Mini 6"],
            "Galaxy Tab": ["Tab S6", "Tab S7", "Tab S8", "Tab S9", "Tab A8", "Tab A9", "Tab Active"],
            "Huawei MatePad": ["MatePad T8", "MatePad 10.4", "MatePad Pro", "MatePad 11"],
            "Xiaomi Pad": ["Mi Pad 4", "Mi Pad 5", "Mi Pad 6", "Redmi Pad"],
            "Lenovo Tab": ["Tab P11", "Tab P12", "Tab M8", "Tab M9", "Yoga Tab"],
            "Microsoft Surface": ["Surface Go", "Surface Pro 7", "Surface Pro 8", "Surface Pro 9", "Surface Laptop Go"],
            "Amazon Fire": ["Fire 7", "Fire 8", "Fire 10 HD", "Fire Max 11"],
            "Honor Pad": ["Honor Pad 8", "Honor Pad X8", "Honor Pad V8"],
            "Oppo Pad": ["Oppo Pad Air", "Oppo Pad 2"],
            "Realme Pad": ["Realme Pad Mini", "Realme Pad X"]
        },
        laptops: {
            "Dell": ["XPS 13", "XPS 15", "Latitude", "Inspiron", "Precision", "G Series"],
            "HP": ["Spectre", "Envy", "Pavilion", "EliteBook", "Omen", "Victus"],
            "MacBook": ["MacBook Air 13", "MacBook Air 15", "MacBook Pro 13", "MacBook Pro 14", "MacBook Pro 16", "MacBook 12"],
            "Lenovo": ["ThinkPad T14", "ThinkPad X1 Carbon", "Legion 5", "Legion 7", "IdeaPad", "Yoga"],
            "Acer": ["Aspire", "Swift", "Predator", "Nitro", "Spin"],
            "Asus": ["ZenBook", "VivoBook", "ROG Zephyrus", "ROG Strix", "TUF Gaming"],
            "Huawei MateBook": ["MateBook D14", "MateBook D15", "MateBook X Pro", "MateBook 13", "MateBook 14"],
            "Xiaomi Laptop": ["Mi Notebook Pro", "RedmiBook", "Xiaomi Book S"],
            "Microsoft Surface Laptop": ["Surface Laptop 4", "Surface Laptop 5", "Surface Laptop Studio"],
            "Samsung Galaxy Book": ["Galaxy Book2", "Galaxy Book3", "Galaxy Book Pro", "Galaxy Book Ultra"],
            "MSI": ["GS Stealth", "GE Raider", "GP Leopard", "GF Thin", "Creator"],
            "Razer": ["Razer Blade 14", "Razer Blade 15", "Razer Blade 16", "Razer Blade 18"]
        },
        smartwatches: {
            "Apple Watch": ["Series 4", "Series 5", "Series 6", "SE", "Series 7", "Series 8", "Ultra", "Series 9"],
            "Samsung Galaxy Watch": ["Galaxy Watch 4", "Galaxy Watch 5", "Galaxy Watch 6", "Galaxy Watch Active"],
            "Huawei Watch": ["Watch GT 2", "Watch GT 3", "Watch 3", "Watch 4"],
            "Xiaomi Watch": ["Mi Watch", "Redmi Watch", "Watch S1", "Watch S2"],
            "Amazfit": ["Bip", "GTR", "GTS", "T-Rex", "Falcon"],
            "Garmin": ["Forerunner", "Venu", "Fenix", "Instinct", "Vívomove"],
            "Fitbit": ["Charge", "Versa", "Sense", "Inspire"],
            "Google Pixel Watch": ["Pixel Watch 1", "Pixel Watch 2"],
            "Oppo Watch": ["Oppo Watch 41mm", "Oppo Watch 46mm", "Oppo Watch Free"],
            "Realme Watch": ["Realme Watch 2", "Realme Watch 3", "Realme Watch S"],
            "TicWatch": ["TicWatch Pro", "TicWatch E", "TicWatch C"],
            "Fossil": ["Gen 5", "Gen 6", "Hybrid HR"],
            "Suunto": ["Suunto 7", "Suunto 9"]
        },
        office: {
            "PC": ["لا يتطلب موديل محدد"],
            "طابعة": ["لا يتطلب موديل محدد"],
            "شاشة": ["سامسونج", "LG", "TCL", "إل جي", "توشيبا", "فيليبس", "ديل", "إتش بي", "أخرى"]
        },
        home: {
            "غسالة": ["لا يتطلب موديل محدد"],
            "مكيف": ["لا يتطلب موديل محدد"],
            "فرن": ["لا يتطلب موديل محدد"],
            "مجفف ملابس": ["لا يتطلب موديل محدد"],
            "مروحة سقف": ["لا يتطلب موديل محدد"]
        }
    };

    for (let category in typesByCategory) {
        if (category === "office" || category === "home") continue;
        for (let brand in typesByCategory[category]) {
            if (Array.isArray(typesByCategory[category][brand])) {
                if (!typesByCategory[category][brand].includes("أخرى")) {
                    typesByCategory[category][brand].push("أخرى");
                }
            }
        }
    }

    const categorySelect = document.getElementById('categorySelect');
    const typeSelect = document.getElementById('typeSelect');
    const modelSelect = document.getElementById('modelSelect');

    function updateTypeList() {
        const selectedCategory = categorySelect.value;
        typeSelect.innerHTML = '<option value="">-- اختر النوع --</option>';
        typeSelect.disabled = true;
        modelSelect.innerHTML = '<option value="">-- اختر النوع أولاً --</option>';
        modelSelect.disabled = true;

        if (selectedCategory && typesByCategory[selectedCategory]) {
            const types = typesByCategory[selectedCategory];
            for (let type in types) {
                const option = document.createElement('option');
                option.value = type;
                option.textContent = type;
                typeSelect.appendChild(option);
            }
            typeSelect.disabled = false;
        }
    }

    function updateModelList() {
        const selectedCategory = categorySelect.value;
        const selectedType = typeSelect.value;
        modelSelect.innerHTML = '<option value="">-- اختر الموديل --</option>';
        modelSelect.disabled = true;

        if (selectedCategory && selectedType && typesByCategory[selectedCategory] && typesByCategory[selectedCategory][selectedType]) {
            let models = typesByCategory[selectedCategory][selectedType];
            if (models.length === 1 && models[0] === "لا يتطلب موديل محدد") {
                modelSelect.disabled = true;
                modelSelect.innerHTML = '<option value="">لا يتطلب موديل محدد</option>';
                return;
            }
            modelSelect.disabled = false;
            models.forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                option.textContent = model;
                modelSelect.appendChild(option);
            });
        }
    }

    categorySelect.addEventListener('change', function() {
        updateTypeList();
        modelSelect.disabled = true;
        modelSelect.innerHTML = '<option value="">-- اختر النوع أولاً --</option>';
    });
    typeSelect.addEventListener('change', updateModelList);
    updateTypeList();

    // الخريطة
    let map, marker, currentLatLng = null;
    function initMap() {
        const defaultLoc = [24.7136, 46.6753];
        map = L.map('map').setView(defaultLoc, 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        marker = L.marker(defaultLoc, { draggable: true }).addTo(map);
        currentLatLng = { lat: defaultLoc[0], lng: defaultLoc[1] };
        marker.on('dragend', function(e) {
            const pos = marker.getLatLng();
            currentLatLng = { lat: pos.lat, lng: pos.lng };
            document.getElementById('errorLocation').style.display = 'none';
        });
    }
    function getCurrentLocation() {
        if (!navigator.geolocation) { showToast("المتصفح لا يدعم تحديد الموقع", true); return; }
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                map.setView([lat, lng], 14);
                marker.setLatLng([lat, lng]);
                currentLatLng = { lat, lng };
                document.getElementById('errorLocation').style.display = 'none';
                showToast("تم تحديد موقعك ✅");
            },
            () => showToast("فشل تحديد الموقع، تأكد من تشغيل GPS", true)
        );
    }

    let selectedFiles = [];
    document.getElementById('filesInput').addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        if (files.length > 6) {
            showToast("يمكن رفع 6 ملفات كحد أقصى", true);
            this.value = '';
            return;
        }
        selectedFiles = files;
        const previewDiv = document.getElementById('imagePreview');
        previewDiv.innerHTML = '';
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = function(ev) {
                if (file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    previewDiv.appendChild(img);
                } else if (file.type.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.src = ev.target.result;
                    video.controls = true;
                    previewDiv.appendChild(video);
                }
            };
            reader.readAsDataURL(file);
        });
        document.getElementById('errorFiles').style.display = 'none';
    });

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.backgroundColor = isError ? '#ef4444' : '#22c55e';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    function showError(id, msg) { const el = document.getElementById(id); el.innerText = msg; el.style.display = 'block'; }
    function hideError(id) { const el = document.getElementById(id); if(el) el.style.display = 'none'; }

    let demoMode = false;
    const demoCheckbox = document.getElementById('demoModeCheckbox');
    if (demoCheckbox) {
        demoCheckbox.addEventListener('change', (e) => {
            demoMode = e.target.checked;
            showToast(demoMode ? "✅ وضع تجريبي: يمكنك إرسال الطلب دون تعبئة" : "الوضع العادي: جميع الحقول مطلوبة");
        });
    }

    function validateForm() {
        if (demoMode) return true;
        let valid = true;
        const category = categorySelect.value;
        const type = typeSelect.value;
        const model = modelSelect.value;
        const description = document.getElementById('description').value.trim();
        const hasFiles = selectedFiles.length > 0;
        if (!category) { showError('errorCategory', 'يرجى اختيار الفئة'); valid = false; } else hideError('errorCategory');
        if (!type) { showError('errorType', 'يرجى اختيار النوع/البراند'); valid = false; } else hideError('errorType');
        if (!model && !(category === "office" && (type === "PC" || type === "طابعة")) && !(category === "home")) { showError('errorModel', 'يرجى اختيار الموديل/الفئة'); valid = false; } else hideError('errorModel');
        if (!description) { showError('errorDesc', 'يرجى كتابة وصف المشكلة'); valid = false; } else hideError('errorDesc');
        if (!hasFiles) { showError('errorFiles', 'يرجى رفع صورة أو فيديو للجهاز (حتى 6)'); valid = false; } else hideError('errorFiles');
        if (!currentLatLng) { showError('errorLocation', 'يرجى تحديد موقعك على الخريطة'); valid = false; } else hideError('errorLocation');
        return valid;
    }

    async function saveRequest() {
        if (!validateForm()) return;
        
        let filesBase64 = [];
        if (!demoMode) {
            for (let file of selectedFiles) {
                const base64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
                filesBase64.push(base64);
            }
        }
        
        const requestData = {
            requestNumber: Date.now(),
            customerName: currentUser.fullName,
            customerMobile: currentUser.mobile,
            customerUid: currentUser.uid || null,
            category: categorySelect.value,
            type: typeSelect.value,
            model: modelSelect.value,
            description: document.getElementById('description').value,
            location: currentLatLng || { lat: 24.7136, lng: 46.6753 },
            files: filesBase64,
            status: "pending",
            demo: demoMode,
            createdAt: new Date().toISOString()
        };
        
        if (demoMode) {
            const request = { ...requestData, id: Date.now() };
            saveServiceRequest(request);
            showToast("✅ تم إرسال طلب تجريبي");
            setTimeout(() => { window.location.href = "my-orders.html"; }, 2000);
            return;
        }
        
        try {
            const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
            const { getFirestore, collection, addDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
            
            const firebaseConfig = {
                apiKey: "AIzaSyBrTaYLYWW9H31_O6fWL_36BKB4Oim0ksM",
                authDomain: "techcare-80c7b.firebaseapp.com",
                projectId: "techcare-80c7b",
                storageBucket: "techcare-80c7b.firebasestorage.app",
                messagingSenderId: "94772613240",
                appId: "1:94772613240:web:3d0ae9c03561e7c6bb1d8d",
                measurementId: "G-59VFXVH57V"
            };
            
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            
            await addDoc(collection(db, 'service_requests'), requestData);
            showToast("✅ تم إرسال طلبك بنجاح");
            setTimeout(() => { window.location.href = "my-orders.html"; }, 2000);
        } catch (error) {
            console.error(error);
            showToast("❌ حدث خطأ: " + error.message, true);
        }
    }

    document.getElementById('submitBtn').addEventListener('click', saveRequest);
    document.getElementById('cancelBtn').addEventListener('click', () => { window.location.href = "customer-dashboard.html"; });
    document.getElementById('currentLocationBtn').addEventListener('click', getCurrentLocation);
    window.addEventListener('load', () => {
        initMap();
        updateTypeList();
    });
</script>
</body>
</html>
