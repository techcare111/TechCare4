<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TechCare - ترحيب العميل</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
        }
        .splash {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            animation: fadeOut 2s ease-in forwards;
            animation-delay: 1.5s;
        }
        .splash-logo {
            max-width: 200px;
            animation: zoomIn 0.8s ease-out;
            background: white;
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeOut {
            from { opacity: 1; visibility: visible; }
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="splash" id="splash">
        <img src="assets/logo.png" alt="TechCare" class="splash-logo" onerror="this.src='https://via.placeholder.com/150?text=TechCare'">
    </div>
    <script>
        // بعد انتهاء التأثير، الانتقال إلى صفحة اختيار اللغة
        setTimeout(() => {
            window.location.href = "../common/language.html?return=../Customer-App/login.html";
        }, 2800);
    </script>
</body>
</html>
